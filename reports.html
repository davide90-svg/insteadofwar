---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | Instead Of War</title>
  <style>
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    .wrap { max-width: 800px; margin: 50px auto; padding: 20px; }
    h1 { color: #ff3333; text-transform: uppercase; font-weight: 900; font-size: 3rem; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { border-bottom: 1px solid #1f1f1f; padding: 20px 0; }
    .post-link { color: #fff; text-decoration: none; font-size: 1.5rem; font-weight: bold; }
    .post-link:hover { color: #00e676; }
    .post-date { color: #666; font-family: monospace; display: block; margin-top: 5px; }
    .back { color: #666; text-decoration: none; font-family: monospace; display: inline-block; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="back">← BACK TO HOME</a>
    <h1>Intelligence Reports</h1>
    <ul class="post-list">
      {% for post in site.posts %}
        <li>
          <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
          <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
        </li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
