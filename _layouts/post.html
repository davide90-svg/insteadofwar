<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Instead Of War</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap');
    :root { --bg: #000; --red: #ff3333; --green: #00e676; --white: #fff; --muted: #666; --border: #1f1f1f; }
    body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; line-height: 1.8; margin: 0; padding: 0; }
    .wrap { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
    .home-link { color: var(--muted); text-decoration: none; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; font-size: 0.9rem; }
    .home-link:hover { color: var(--white); }
    
    .translation-box { background: #0a0a0a; border: 1px solid var(--border); padding: 15px; border-radius: 4px; margin-bottom: 40px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .translation-box span { color: var(--muted); margin-right: 10px; }
    .translation-box a { color: var(--white); text-decoration: none; margin-right: 15px; text-transform: uppercase; }
    .translation-box a:hover { color: var(--red); }
    .translation-box strong { color: var(--green); margin-right: 15px; text-transform: uppercase; }

    h1 { color: var(--red); font-weight: 900; font-size: 2.5rem; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 10px; line-height: 1.1; }
    .date { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; margin-bottom: 40px; }
    .content h2 { color: var(--white); margin-top: 40px; font-weight: 900; }
    .content h3 { color: var(--white); margin-top: 30px; font-weight: 700; }
    .content p { color: #ccc; text-align: justify; font-size: 1.1rem; }
    .content a { color: var(--red); text-decoration: underline; text-underline-offset: 3px; }
    .content blockquote { border-left: 4px solid var(--red); margin: 0; padding-left: 20px; font-style: italic; color: #fff; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a href="/reports.html" class="home-link">← BACK TO REPORTS</a>
    </header>

    <div class="translation-box">
      <span>AVAILABLE IN:</span>
      {% assign translations = site.posts | where: "ref", page.ref %}
      {% for t in translations %}
        {% if t.url == page.url %}
          <strong>{{ t.lang }}</strong>
        {% else %}
          <a href="{{ t.url }}">{{ t.lang }}</a>
        {% endif %}
      {% endfor %}
    </div>

    <article>
      <h1>{{ page.title }}</h1>
      <p class="date">{{ page.date | date: "%Y-%m-%d" }}</p>
      <div class="content">
        {{ content }}
      </div>
    </article>
  </div>
</body>
</html>
